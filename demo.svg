<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .term { font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace; font-size: 13px; }
      .bold { font-weight: 700; }
      .dim { fill: #888; }
      .white { fill: #e0e0e0; }
      .green { fill: #50fa7b; }
      .yellow { fill: #f1fa8c; }
      .red { fill: #ff5555; }
      .cyan { fill: #8be9fd; }
      .prompt { fill: #bd93f9; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="820" height="520" rx="10" fill="#282a36"/>
  <!-- Title bar -->
  <rect width="820" height="36" rx="10" fill="#21222c"/>
  <rect y="26" width="820" height="10" fill="#21222c"/>
  <circle cx="20" cy="18" r="6" fill="#ff5555"/>
  <circle cx="40" cy="18" r="6" fill="#f1fa8c"/>
  <circle cx="60" cy="18" r="6" fill="#50fa7b"/>
  <text x="410" y="22" text-anchor="middle" class="term dim" font-size="12">context-drift</text>

  <!-- Terminal content -->
  <g transform="translate(20, 56)">
    <!-- Command prompt -->
    <text y="0" class="term prompt">$</text>
    <text x="16" y="0" class="term white">context-drift scan</text>

    <!-- Blank line -->

    <!-- Header -->
    <text y="30" class="term white bold">context-drift v0.1.3</text>
    <text x="170" y="30" class="term white"> — 1 file scanned</text>

    <!-- Blank line -->

    <!-- File header -->
    <text y="60" class="term white bold" text-decoration="underline">CLAUDE.md</text>

    <!-- Issues -->
    <text y="80" class="term yellow">  ⚠</text>
    <text x="36" y="80" class="term dim">MISSING_PATH          </text>
    <text x="270" y="80" class="term white">Line 17: References "src/nonexistent" — path not found</text>

    <text y="100" class="term red">  ✗</text>
    <text x="36" y="100" class="term dim">DEAD_COMMAND          </text>
    <text x="270" y="100" class="term white">Line 23: "npm run test:e2e" — script not found</text>

    <text y="120" class="term red">  ✗</text>
    <text x="36" y="120" class="term dim">DEAD_COMMAND          </text>
    <text x="270" y="120" class="term white">Line 29: "pnpm format" — script not found</text>

    <text y="140" class="term yellow">  ⚠</text>
    <text x="36" y="140" class="term dim">MISSING_DEPENDENCY    </text>
    <text x="270" y="140" class="term white">Line 3: Claims "Express 4" but not in manifest</text>

    <text y="160" class="term yellow">  ⚠</text>
    <text x="36" y="160" class="term dim">STALE_DEPENDENCY      </text>
    <text x="270" y="160" class="term white">Line 3: Claims "React 18" but manifest has react@19</text>

    <text y="180" class="term yellow">  ⚠</text>
    <text x="36" y="180" class="term dim">MISSING_DEPENDENCY    </text>
    <text x="270" y="180" class="term white">Line 7: Claims "Express" but not in manifest</text>

    <!-- Blank line -->

    <!-- Summary -->
    <text y="210" class="term white">Summary: </text>
    <text x="72" y="210" class="term yellow">4 warnings</text>
    <text x="164" y="210" class="term white">, </text>
    <text x="176" y="210" class="term red">2 errors</text>
    <text x="252" y="210" class="term white"> across 1 file</text>

    <!-- Drift Score -->
    <text y="240" class="term yellow">Drift Score: 68/100</text>

    <!-- Second command -->
    <text y="280" class="term prompt">$</text>
    <text x="16" y="280" class="term white">context-drift scan --ai --provider anthropic</text>

    <text y="310" class="term white bold">context-drift v0.1.3</text>
    <text x="170" y="310" class="term white"> — 1 file scanned</text>

    <text y="340" class="term white bold" text-decoration="underline">CLAUDE.md</text>

    <text y="360" class="term red">  ✗</text>
    <text x="36" y="360" class="term dim">SEMANTIC_DRIFT        </text>
    <text x="270" y="360" class="term white">Line 12: Claims Express but codebase uses Hono</text>

    <text y="380" class="term yellow">  ⚠</text>
    <text x="36" y="380" class="term dim">SEMANTIC_DRIFT        </text>
    <text x="270" y="380" class="term white">Line 45: "microservices" but repo is a monolith</text>

    <text y="410" class="term white">Summary: </text>
    <text x="72" y="410" class="term yellow">1 warning</text>
    <text x="148" y="410" class="term white">, </text>
    <text x="160" y="410" class="term red">1 error</text>
    <text x="224" y="410" class="term white"> across 1 file</text>

    <text y="440" class="term yellow">Drift Score: 84/100</text>
  </g>
</svg>
